<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <link rel="icon" href="ixl.ico">
    <link href="https://fonts.googleapis.com/css2?family=Datatype&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            margin: 0;
            background-color: #000;
            background-image: 
                linear-gradient(var(--theme-grid, rgba(255,255,255,0.1)) 1px, transparent 1px),
                linear-gradient(90deg, var(--theme-grid, rgba(255,255,255,0.1)) 1px, transparent 1px);
            background-size: 50px 50px;
            padding-top: 80px;
        }
        .top-bar {
            position: fixed;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 420px;
            width: max-content;
            max-width: 90vw;
            padding: 0 48px;
            height: 72px;
            background-color: rgba(0, 0, 0, 0.85);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            border: 2.5px solid var(--theme-border, #fff);
        }
        .top-bar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 10px;
            border: 2px solid var(--theme-border, #fff);
            border-radius: 10px;
            font-family: 'Datatype', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .top-bar a:hover {
            background-color: var(--theme-border, #fff);
            color: #000;
        }
        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
        }
        .calculator {
            background: rgba(0,0,0,0.7);
            border: 2px solid var(--theme-border, #fff);
            border-radius: 16px;
            padding: 32px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .calculator input[type="text"] {
            width: 240px;
            font-size: 24px;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid var(--theme-border, #fff);
            background: rgba(0,0,0,0.8);
            color: #fff;
            margin-bottom: 16px;
            text-align: right;
            font-family: 'Datatype', sans-serif;
        }
        .calculator .buttons {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 12px;
        }
        .calculator button {
            padding: 16px 0;
            font-size: 20px;
            border-radius: 8px;
            border: 2px solid var(--theme-border, #fff);
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            font-family: 'Datatype', sans-serif;
            transition: background 0.2s, color 0.2s;
        }
        .calculator button:hover {
            background: var(--theme-border, #fff);
            color: #000;
        }
    </style>
<script>
    (function() {
        const color = localStorage.getItem('themeColor') || '#fff';
        document.documentElement.style.setProperty('--theme-grid', color === '#000000' ? 'rgba(255,255,255,0.1)' : color+'33');
        document.documentElement.style.setProperty('--theme-border', color);
    })();
            // Inject music player logic (shared across all pages)
            (function() {
                if (window.hasMusicPlayer) return;
                window.hasMusicPlayer = true;
                let audio = null;
                function playMusic() {
                    const enabled = localStorage.getItem('bgMusicEnabled') === 'true';
                    const track = localStorage.getItem('bgMusicTrack') || 'PulseBox - Jazz Walk.mp3';
                    const volume = parseFloat(localStorage.getItem('bgMusicVolume') || '0.5');
                    if (!enabled) {
                        if (audio) { audio.pause(); audio.currentTime = 0; }
                        return;
                    }
                    if (!audio) {
                        audio = new Audio(track);
                        audio.loop = true;
                    } else if (audio.src.indexOf(track) === -1) {
                        audio.src = track;
                    }
                    audio.volume = volume;
                    audio.loop = true;
                    audio.play().catch(()=>{});
                }
                window.addEventListener('bgMusicSettingsChanged', playMusic);
                window.addEventListener('storage', playMusic);
                document.addEventListener('visibilitychange', function() {
                    if (!document.hidden) playMusic();
                });
                playMusic();
            })();
</script>
</head>
<body>
    <div class="top-bar">
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
        <a href="apps.html">Apps</a>
        <a href="settings.html">Settings</a>
    </div>
    <div class="content">
        <div class="calculator">
            <input type="text" id="display" readonly>
            <div class="buttons">
                <button onclick="press('7')">7</button>
                <button onclick="press('8')">8</button>
                <button onclick="press('9')">9</button>
                <button onclick="press('/')">÷</button>
                <button onclick="press('4')">4</button>
                <button onclick="press('5')">5</button>
                <button onclick="press('6')">6</button>
                <button onclick="press('*')">×</button>
                <button onclick="press('1')">1</button>
                <button onclick="press('2')">2</button>
                <button onclick="press('3')">3</button>
                <button onclick="press('-')">−</button>
                <button onclick="press('0')">0</button>
                <button onclick="press('.')">.</button>
                <button onclick="calculate()">=</button>
                <button onclick="press('+')">+</button>
                <button onclick="clearDisplay()" style="grid-column: span 4; background: #ff4444; color: #fff;">C</button>
            </div>
        </div>
    </div>
    <script>
        let display = document.getElementById('display');
        let current = '';
        const operators = ['+', '-', '*', '/'];
        function press(val) {
            if (operators.includes(val)) {
                // If last char is operator, replace it
                if (current.length > 0 && operators.includes(current.slice(-1))) {
                    current = current.slice(0, -1) + val;
                } else {
                    current += val;
                }
            } else {
                current += val;
            }
            display.value = current;
        }
        function calculate() {
            try {
                // Don't allow calculation if last char is operator
                if (current.length > 0 && operators.includes(current.slice(-1))) {
                    current = current.slice(0, -1);
                }
                current = eval(current).toString();
                display.value = current;
            } catch {
                display.value = 'Error';
                current = '';
            }
        }
        function clearDisplay() {
            current = '';
            display.value = '';
        }
    </script>
</body>
</html>
